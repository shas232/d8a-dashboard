version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -E '^(DASHBOARD_|JWT_|FIREBASE_|D8A_)' > .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
